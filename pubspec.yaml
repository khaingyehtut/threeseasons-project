name: three_seasons_project
description: "Three Seasons - Modern Ecommerce App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  get: ^4.6.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_analytics: ^11.3.3
  firebase_messaging: ^15.1.3
  firebase_in_app_messaging: ^0.8.1+10
  flutter_local_notifications: ^18.0.1

  # HTTP (for photo upload to Node.js)
  dio: ^5.4.3

  # Local storage
  shared_preferences: ^2.2.3

  # UI & design
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  carousel_slider: ^5.0.0
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1

  # Images
  image_picker: ^1.1.2

  # Animations
  animate_do: ^3.3.4

  # Real-time
  socket_io_client: ^2.0.3+1

  # Connectivity
  connectivity_plus: ^6.1.0

  # Charts
  fl_chart: ^0.69.0

  # Audio
  audioplayers: ^6.1.0

  # External links
  url_launcher: ^6.3.0

  # Color extraction from images
  palette_generator: ^0.3.3

  # Utilities
  intl: ^0.19.0
  timeago: ^3.7.0

  # POS printing
  pdf: ^3.10.8
  printing: ^5.12.0
  blue_thermal_printer: ^1.1.1
  permission_handler: ^11.3.1

  # Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Routing
  go_router: ^14.6.3

dependency_overrides:
  shared_preferences_android: 2.4.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/
    - assets/sounds/
